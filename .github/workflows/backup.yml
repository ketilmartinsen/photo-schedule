# .github/workflows/backup.yml
#
# Weekly backup of photo_schedule table to backups/photo-schedule-backup.csv
#
# Setup:
# 1. Go to your GitHub repo → Settings → Secrets and variables → Actions
# 2. Add these two secrets:
#    SUPABASE_URL      → https://hgsvsisnauzrlwqaicim.supabase.co
#    SUPABASE_ANON_KEY → your anon key (same one in index.html)

name: Weekly Supabase Backup

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 04:00 UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data from Supabase and write CSV
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs    = require('fs');

          const url  = process.env.SUPABASE_URL;
          const key  = process.env.SUPABASE_ANON_KEY;
          const table = 'photo_schedule';

          // Paginate through all rows (Supabase caps at 1000 per request)
          async function fetchAll() {
            let all  = [];
            let from = 0;
            const PAGE = 1000;

            while (true) {
              const data = await fetchPage(from, from + PAGE - 1);
              if (!data || data.length === 0) break;
              all = all.concat(data);
              if (data.length < PAGE) break;
              from += PAGE;
            }
            return all;
          }

          function fetchPage(from, to) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: new URL(url).hostname,
                path: `/rest/v1/${table}?select=date,type,artist,venue,shooting,management,status,comment&order=date.asc`,
                headers: {
                  'apikey': key,
                  'Authorization': `Bearer ${key}`,
                  'Range': `${from}-${to}`,
                  'Range-Unit': 'items',
                },
              };
              https.get(options, res => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(body)); }
                  catch(e) { reject(e); }
                });
              }).on('error', reject);
            });
          }

          function escapeCSV(val) {
            if (val === null || val === undefined) return '';
            const str = String(val);
            if (str.includes(',') || str.includes('"') || str.includes('\n')) {
              return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
          }

          fetchAll().then(rows => {
            if (rows.length === 0) {
              console.log('No rows returned from Supabase.');
              process.exit(1);
            }

            const headers = ['date','type','artist','venue','shooting','management','status','comment'];
            const lines   = [headers.join(',')];

            rows.forEach(row => {
              lines.push(headers.map(h => escapeCSV(row[h])).join(','));
            });

            const timestamp = new Date().toISOString().substring(0, 10);
            const csv = `# PhotoSchedule backup — ${timestamp} — ${rows.length} rows\n` + lines.join('\n');

            fs.mkdirSync('backups', { recursive: true });
            fs.writeFileSync('backups/photo-schedule-backup.csv', csv, 'utf8');
            console.log(`✓ Wrote ${rows.length} rows to backups/photo-schedule-backup.csv`);
          }).catch(err => {
            console.error('Fetch failed:', err);
            process.exit(1);
          });
          EOF

      - name: Commit and push backup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/photo-schedule-backup.csv
          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "No changes since last backup — skipping commit."
          else
            ROWS=$(grep -c "^[^#]" backups/photo-schedule-backup.csv || echo "?")
            git commit -m "backup: $(date -u +%Y-%m-%d) — ${ROWS} rows"
            git push
          fi
