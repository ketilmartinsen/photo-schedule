<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📸 Årsrapport</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%B8%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:      #f7f5f0;
      --paper:   #ffffff;
      --border:  #e0dbd0;
      --gold:    #b8860b;
      --gold2:   #e8a020;
      --text:    #1a1a1a;
      --muted:   #888;
      --subtle:  #f0ece4;
      --konsert: #8b1a9a;
      --fotball: #006b6b;
      --pride:   #c0396a;
      --annet:   #5a6473;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Screen toolbar (hidden on print) ── */
    .toolbar {
      background: #1a1a1a; color: #eee;
      padding: 12px 40px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      position: sticky; top: 0; z-index: 100;
    }
    .toolbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold2); letter-spacing: 1px; }
    .year-pill {
      cursor: pointer; padding: 4px 14px; border-radius: 20px;
      border: 1px solid #444; font-size: 12px; font-weight: 600;
      background: transparent; color: #aaa; transition: all 0.15s;
    }
    .year-pill:hover { border-color: var(--gold2); color: var(--gold2); }
    .year-pill.active { background: var(--gold2); color: #000; border-color: var(--gold2); }
    .btn-print {
      margin-left: auto; padding: 7px 18px; border-radius: 6px;
      background: var(--gold2); color: #000; border: none;
      font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .btn-print:hover { background: #c07010; }

    /* ── Report page ── */
    .report {
      max-width: 900px; margin: 36px auto; padding: 0 24px;
    }

    /* ── Report header ── */
    .report-header {
      background: var(--paper); border: 1px solid var(--border);
      border-top: 6px solid var(--gold); border-radius: 4px;
      padding: 52px 56px 40px;
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 24px;
    }
    .report-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px; line-height: 1; letter-spacing: 2px; color: var(--text);
    }
    .report-title span { color: var(--gold); }
    .report-subtitle { font-size: 13px; color: var(--muted); margin-top: 8px; letter-spacing: 1px; text-transform: uppercase; }
    .report-year-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 100px; line-height: 1; color: var(--subtle);
      text-align: right; user-select: none;
    }

    /* ── KPI row ── */
    .kpi-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 4px; padding: 24px 20px;
      border-bottom: 3px solid var(--gold);
    }
    .kpi-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px; line-height: 1; color: var(--gold);
    }
    .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-top: 4px; }

    /* ── Two columns ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    /* ── Card ── */
    .card {
      background: var(--paper); border: 1px solid var(--border);
      border-radius: 4px; padding: 28px 28px;
    }
    .card-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: var(--gold); margin-bottom: 18px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }

    /* ── Bar chart ── */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .bar-label { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; width: 130px; }
    .bar-track { flex: 1; background: var(--subtle); border-radius: 2px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 2px; transition: width 0.8s; }
    .bar-count { width: 28px; font-size: 11px; color: var(--muted); text-align: right; flex-shrink: 0; }

    /* ── Month sparkline ── */
    .spark { display: flex; align-items: flex-end; gap: 5px; height: 80px; }
    .spark-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .spark-bar { width: 100%; border-radius: 2px 2px 0 0; background: var(--gold); min-height: 3px; transition: height 0.8s; }
    .spark-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }
    .spark-num { font-size: 9px; color: var(--text); font-weight: 600; }

    /* ── Status badges ── */
    .status-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--subtle); font-size: 13px; }
    .status-row:last-child { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .badge-søke    { background:#fff3cd;color:#856404; }
    .badge-søkt    { background:#cfe2ff;color:#084298; }
    .badge-ok      { background:#d1e7dd;color:#0a3622; }
    .badge-ferdig  { background:#e9ecef;color:#495057; }

    /* ── Event table ── */
    .event-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .event-table th { text-align: left; padding: 7px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 2px solid var(--border); }
    .event-table td { padding: 7px 10px; border-bottom: 1px solid var(--subtle); vertical-align: top; }
    .event-table tr:last-child td { border-bottom: none; }
    .type-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }

    /* ── Success rate ring ── */
    .ring-wrap { display: flex; align-items: center; justify-content: center; gap: 24px; }
    .ring-svg { flex-shrink: 0; }
    .ring-info { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--gold); line-height: 1; }
    .ring-sub { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    /* ── Loading ── */
    #loadMsg { text-align: center; padding: 80px; color: var(--muted); font-size: 15px; }

    /* ── Print styles ── */
    @media print {
      .toolbar { display: none !important; }
      body { background: white; }
      .report { margin: 0; padding: 10mm; max-width: 100%; }
      .report-header, .kpi-card, .card { box-shadow: none; border-color: #ccc; }
      .card { break-inside: avoid; }
      .two-col, .three-col { break-inside: avoid; }
      @page { margin: 10mm; size: A4; }
    }
  </style>
</head>
<body>

<!-- ── Toolbar ── -->
<div class="toolbar" id="toolbar">
  <span class="toolbar-title">📸 Årsrapport</span>
  <div id="yearPills" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  <button class="btn-print" onclick="window.print()">🖨 Skriv ut / Lagre PDF</button>
</div>

<div id="loadMsg">Laster rapport…</div>
<div class="report" id="report" style="display:none"></div>

<script>
  const SUPA_URL = 'https://hgsvsisnauzrlwqaicim.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhnc3ZzaXNuYXV6cmx3cWFpY2ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Mjk1MjIsImV4cCI6MjA5MTMwNTUyMn0.FrvfXV3b7zC7ct8S9Y4rbMPYWkDEnG3bZW3Kt0Rn-zw';
  const db    = supabase.createClient(SUPA_URL, SUPA_KEY);
  const TABLE = 'photo_schedule';

  const DAYS  = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
  const MONTHS = ['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];
  const TYPE_COLORS = { Konsert:'#8b1a9a', Fotball:'#006b6b', OsloPride:'#c0396a', Annet:'#5a6473' };

  let allData = [];
  let selectedYear = new Date().getFullYear();

  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function getDay(d){ return d ? DAYS[new Date(d+'T12:00:00').getDay()] : ''; }

  async function loadAll() {
    const PAGE = 1000; let all = []; let from = 0; let go = true;
    while(go) {
      const { data, error } = await db.from(TABLE).select('*').range(from, from+PAGE-1);
      if(error || !data || !data.length){ go=false; }
      else { all=all.concat(data); go=data.length===PAGE; from+=PAGE; }
    }
    return all;
  }

  function buildYearPills(years) {
    const pills = document.getElementById('yearPills');
    pills.innerHTML = years.map(y => `
      <button class="year-pill ${y===selectedYear?'active':''}" onclick="selectYear(${y})">${y}</button>
    `).join('');
  }

  function selectYear(y) {
    selectedYear = y;
    document.querySelectorAll('.year-pill').forEach(p => {
      p.classList.toggle('active', parseInt(p.textContent) === y);
    });
    renderReport();
  }

  function renderReport() {
    const evts = allData.filter(r => r.date && r.date.startsWith(selectedYear));
    const report = document.getElementById('report');
    if(!evts.length) {
      report.innerHTML = `<div style="text-align:center;padding:80px;color:var(--muted)">Ingen events registrert for ${selectedYear}.</div>`;
      report.style.display = 'block';
      document.getElementById('loadMsg').style.display = 'none';
      return;
    }

    // ── Counts ──
    const typeCounts   = { Konsert:0, Fotball:0, OsloPride:0, Annet:0 };
    const statusCounts = { 'Søke':0,'Har søkt':0,'Akkred Ok':0,'Ferdig':0 };
    const venueCounts  = {};
    const shootCounts  = {};
    const monthCounts  = Array(12).fill(0);

    evts.forEach(r => {
      if(typeCounts.hasOwnProperty(r.type)) typeCounts[r.type]++;
      if(statusCounts.hasOwnProperty(r.status)) statusCounts[r.status]++;
      if(r.venue&&r.venue.trim()) { const v=r.venue.trim(); venueCounts[v]=(venueCounts[v]||0)+1; }
      if(r.shooting&&r.shooting.trim()) { const s=r.shooting.trim(); shootCounts[s]=(shootCounts[s]||0)+1; }
      if(r.date) { const m=parseInt(r.date.substring(5,7))-1; monthCounts[m]++; }
    });

    const topVenues = Object.entries(venueCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
    const topShoot  = Object.entries(shootCounts).sort((a,b)=>b[1]-a[1]);
    const maxV = topVenues.length ? topVenues[0][1] : 1;
    const maxS = topShoot.length  ? topShoot[0][1]  : 1;
    const maxM = Math.max(...monthCounts, 1);

    const done    = (statusCounts['Akkred Ok']||0) + (statusCounts['Ferdig']||0);
    const rate    = evts.length ? Math.round((done/evts.length)*100) : 0;
    const circumf = 2 * Math.PI * 40;
    const dash    = circumf * (rate / 100);

    const barRow = (label, count, max, color) => `
      <div class="bar-row">
        <div class="bar-label" title="${esc(label)}">${esc(label)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round((count/max)*100)}%;background:${color}"></div></div>
        <div class="bar-count">${count}</div>
      </div>`;

    report.innerHTML = `

      <!-- Header -->
      <div class="report-header">
        <div>
          <div class="report-title">Års<span>rapport</span></div>
          <div class="report-subtitle">Fotografi · Konsert &amp; Sport</div>
        </div>
        <div class="report-year-badge">${selectedYear}</div>
      </div>

      <!-- KPIs -->
      <div class="kpi-row">
        <div class="kpi-card">
          <div class="kpi-num">${evts.length}</div>
          <div class="kpi-label">Events totalt</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-num">${typeCounts.Konsert}</div>
          <div class="kpi-label">Konserter</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-num">${typeCounts.Fotball}</div>
          <div class="kpi-label">Fotballkamper</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-num">${rate}%</div>
          <div class="kpi-label">Suksessrate</div>
        </div>
      </div>

      <!-- Month chart + Status -->
      <div class="two-col">
        <div class="card">
          <div class="card-title">Events per måned</div>
          <div class="spark">
            ${monthCounts.map((n,i) => `
              <div class="spark-col">
                <div class="spark-num">${n||''}</div>
                <div class="spark-bar" style="height:${n>0?Math.round((n/maxM)*64)+4:3}px;opacity:${n>0?1:0.2}"></div>
                <div class="spark-label">${MONTHS[i]}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-title">Akkrediteringsstatus</div>
          ${Object.entries(statusCounts).map(([s,n]) => {
            const bc = {Søke:'badge-søke','Har søkt':'badge-søkt','Akkred Ok':'badge-ok','Ferdig':'badge-ferdig'}[s]||'';
            return `<div class="status-row">
              <span class="badge ${bc}">${s}</span>
              <strong>${n}</strong>
            </div>`;
          }).join('')}
          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--subtle);display:flex;align-items:center;gap:12px">
            <svg class="ring-svg" width="90" height="90" viewBox="0 0 90 90">
              <circle cx="45" cy="45" r="40" fill="none" stroke="#e9ecef" stroke-width="8"/>
              <circle cx="45" cy="45" r="40" fill="none" stroke="var(--gold)" stroke-width="8"
                stroke-dasharray="${dash.toFixed(1)} ${circumf.toFixed(1)}"
                stroke-dashoffset="${(circumf/4).toFixed(1)}"
                stroke-linecap="round"/>
              <text x="45" y="50" text-anchor="middle" font-family="Bebas Neue,sans-serif" font-size="20" fill="var(--gold)">${rate}%</text>
            </svg>
            <div>
              <div class="ring-sub">Suksessrate</div>
              <div style="font-size:12px;color:var(--muted);margin-top:4px">${done} av ${evts.length} fullført</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Type + Shooting -->
      <div class="two-col">
        <div class="card">
          <div class="card-title">Per type</div>
          ${Object.entries(typeCounts).map(([t,n]) =>
            barRow(t, n, evts.length, TYPE_COLORS[t]||'#888')).join('')}
        </div>
        <div class="card">
          <div class="card-title">Foto for</div>
          ${topShoot.length
            ? topShoot.map(([s,n]) => barRow(s,n,maxS,'#c0396a')).join('')
            : '<div style="color:var(--muted);font-size:12px">Ingen data</div>'}
        </div>
      </div>

      <!-- Venues -->
      <div class="card" style="margin-bottom:24px">
        <div class="card-title">Topp venues</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 32px">
          ${topVenues.map(([v,n]) => barRow(v,n,maxV,'#006b6b')).join('')}
        </div>
      </div>

      <!-- Full event list -->
      <div class="card" style="margin-bottom:40px">
        <div class="card-title">Alle events ${selectedYear}</div>
        <table class="event-table">
          <thead>
            <tr>
              <th>Dato</th><th>Dag</th><th>Type</th><th>Artist / Event</th>
              <th>Venue</th><th>Foto for</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${evts.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(e => {
              const bc={Søke:'badge-søke','Har søkt':'badge-søkt','Akkred Ok':'badge-ok','Ferdig':'badge-ferdig'}[e.status]||'';
              const col=TYPE_COLORS[e.type]||'#888';
              return `<tr>
                <td>${e.date||'—'}</td>
                <td style="color:var(--muted)">${getDay(e.date)}</td>
                <td><span class="type-dot" style="background:${col}"></span>${esc(e.type)}</td>
                <td><strong>${esc(e.artist)}</strong></td>
                <td>${esc(e.venue)}</td>
                <td>${esc(e.shooting)}</td>
                <td><span class="badge ${bc}">${esc(e.status)}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;

    report.style.display = 'block';
    document.getElementById('loadMsg').style.display = 'none';
  }

  async function init() {
    allData = await loadAll();
    const years = [...new Set(allData.filter(r=>r.date).map(r=>parseInt(r.date.substring(0,4))))].sort((a,b)=>b-a);
    if(years.length) selectedYear = years[0];
    buildYearPills(years);
    renderReport();
  }

  init();
</script>
</body>
</html>
