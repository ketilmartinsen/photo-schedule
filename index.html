<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📸 Photo Schedule</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #242424;
      --border:   #333;
      --accent:   #e8a020;
      --accent2:  #c07010;
      --text:     #e8e8e8;
      --muted:    #888;
      --danger:   #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
      border-bottom: 2px solid var(--accent);
      padding: 16px 28px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    header h1 { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    header h1 span { color: var(--text); font-weight: 300; }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .sync-indicator { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .sync-dot.online { background: #27ae60; }
    .sync-dot.saving { background: var(--accent); animation: pulse 0.8s infinite; }
    .sync-dot.error  { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Buttons ── */
    button { cursor: pointer; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; padding: 8px 16px; transition: all 0.15s; }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-primary:hover  { background: var(--accent2); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #333; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; font-size: 12px; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-edit { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; font-size: 12px; }
    .btn-edit:hover { background: var(--accent); color: #000; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Year bar ── */
    .year-bar {
      background: #111;
      border-bottom: 1px solid var(--border);
      padding: 10px 28px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .year-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-right: 6px; }
    .year-btn {
      cursor: pointer; padding: 4px 13px; border-radius: 20px;
      border: 1px solid var(--border); font-size: 12px; font-weight: 700;
      background: transparent; color: var(--muted); transition: all 0.15s;
    }
    .year-btn:hover  { border-color: var(--accent); color: var(--accent); }
    .year-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .year-count { font-size: 10px; opacity: 0.7; margin-left: 2px; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 12px 28px;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .toolbar input[type="text"] {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 7px 12px; font-size: 13px; width: 200px;
    }
    .toolbar input[type="text"]::placeholder { color: var(--muted); }
    .filter-label { color: var(--muted); font-size: 12px; margin-left: 6px; }
    .filter-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .pill { cursor: pointer; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; background: transparent; color: var(--muted); transition: all 0.15s; }
    .pill.active, .pill:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Type totals ── */
    .type-totals {
      margin-left: auto; display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--muted); white-space: nowrap; padding-left: 14px;
      border-left: 1px solid var(--border);
    }
    .type-total-item { display: flex; align-items: center; gap: 5px; }
    .type-total-item strong { color: var(--text); font-size: 13px; }
    .type-total-sep { color: var(--border); }
    .global-search-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #1a1000; border: 1px solid var(--accent); border-radius: 12px;
      padding: 2px 10px; font-size: 11px; color: var(--accent); font-weight: 700;
      animation: pulse 1.5s infinite;
    }

    /* ── Stats ── */
    .stats { display: flex; gap: 20px; padding: 8px 28px 10px; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); }
    .stat { font-size: 12px; color: var(--muted); }
    .stat strong { color: var(--text); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; padding: 16px 28px; }
    table { width: 100%; border-collapse: collapse; min-width: 980px; }
    thead tr { background: var(--surface2); text-align: left; }
    th { padding: 10px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent); border-bottom: 2px solid var(--accent); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 8px 12px; vertical-align: middle; }
    .td-actions { display: flex; gap: 6px; white-space: nowrap; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
    .badge-apply   { background: #3d2200; color: #e8a020; border: 1px solid #e8a020; }
    .badge-applied { background: #0a2540; color: #5dade2; border: 1px solid #2980b9; }
    .badge-ok      { background: #0a2e1a; color: #58d68d; border: 1px solid #27ae60; }
    .badge-done    { background: #222;    color: #888;    border: 1px solid #555; }
    .type-konsert   { color: #e056fd; font-weight: 600; }
    .type-fotball   { color: #00cec9; font-weight: 600; }
    .type-oslopride { color: #ff6eb4; font-weight: 600; }
    .type-annet     { color: #a0aec0; font-weight: 600; }

    /* ── Skeleton ── */
    .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, #2e2e2e 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 4px; height: 14px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── Modal ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--accent); border-radius: 10px; padding: 28px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 17px; margin-bottom: 20px; color: var(--accent); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
    input[type="date"], input[type="text"], select, textarea {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; width: 100%; transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    select option { background: var(--surface2); }
    textarea { resize: vertical; min-height: 60px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); color: var(--text); padding: 12px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transform: translateY(10px); transition: all 0.25s; z-index: 200; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-left-color: var(--danger); }

    @media (max-width: 600px) {
      header, .year-bar, .toolbar, .table-wrap, .stats { padding-left: 14px; padding-right: 14px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>📸 <span>Photo</span>Schedule</h1>
  <div class="header-actions">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Kobler til…</span>
    </div>
    <button class="btn-secondary" onclick="exportCSV()">⬇ Eksporter CSV</button>
    <button class="btn-primary" onclick="openModal()" id="addBtn" disabled>＋ Legg til event</button>
  </div>
</header>

<!-- ── Year bar ── -->
<div class="year-bar" id="yearBar">
  <span class="year-label">År:</span>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <input type="text" id="search" placeholder="🔍 Søk i alle år…" oninput="onSearchInput()">
  <span class="filter-label">Type:</span>
  <div class="filter-pills">
    <button class="pill active" data-filter="all"       onclick="setFilter('all',this)">Alle</button>
    <button class="pill" data-filter="Konsert"          onclick="setFilter('Konsert',this)">Konsert</button>
    <button class="pill" data-filter="Fotball"          onclick="setFilter('Fotball',this)">Fotball</button>
    <button class="pill" data-filter="OsloPride"        onclick="setFilter('OsloPride',this)">Oslo Pride</button>
    <button class="pill" data-filter="Annet"            onclick="setFilter('Annet',this)">Annet</button>
  </div>
  <span class="filter-label">Status:</span>
  <div class="filter-pills">
    <button class="pill" data-status="Søke"      onclick="setStatusFilter('Søke',this)">Søke</button>
    <button class="pill" data-status="Har søkt"  onclick="setStatusFilter('Har søkt',this)">Har søkt</button>
    <button class="pill" data-status="Akkred Ok" onclick="setStatusFilter('Akkred Ok',this)">Akkred Ok</button>
    <button class="pill" data-status="Ferdig"    onclick="setStatusFilter('Ferdig',this)">Ferdig</button>
  </div>
  <div id="typeTotals" class="type-totals"></div>
</div>

<!-- ── Stats ── -->
<div class="stats" id="stats"></div>

<!-- ── Table ── -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Dato</th>
        <th>Dag</th>
        <th>Type</th>
        <th>Artist / Event</th>
        <th>Venue</th>
        <th>Foto for</th>
        <th>Management</th>
        <th>Status</th>
        <th>Kommentar</th>
        <th>Handlinger</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">🎸</div>
    <p>Ingen events for dette året ennå.</p>
  </div>
</div>

<!-- ── Modal ── -->
<div class="overlay" id="overlay" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <h2 id="modalTitle">Legg til event</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Dato</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option value="Konsert">Konsert</option>
          <option value="Fotball">Fotball</option>
          <option value="OsloPride">Oslo Pride</option>
          <option value="Annet">Annet</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Artist / Event</label>
        <input type="text" id="f-artist" placeholder="f.eks. Metallica, Champions League Final">
      </div>
      <div class="form-group full">
        <label>Venue</label>
        <input type="text" id="f-venue" placeholder="f.eks. Telenor Arena, Ullevaal Stadion">
      </div>
      <div class="form-group">
        <label>Foto for</label>
        <select id="f-shooting">
          <option value="">— Velg —</option>
          <option value="Blezt">Blezt</option>
          <option value="Puls">Puls</option>
          <option value="MH">MH</option>
          <option value="NRM">NRM</option>
          <option value="Disharmoni">Disharmoni</option>
          <option value="Musikknyheter">Musikknyheter</option>
          <option value="Festivalguide">Festivalguide</option>
          <option value="Tons of Rock">Tons of Rock</option>
          <option value="Oslo Pride">Oslo Pride</option>
          <option value="Annet">Annet</option>
        </select>
      </div>
      <div class="form-group">
        <label>Management</label>
        <input type="text" id="f-management" placeholder="f.eks. Live Nation">
      </div>
      <div class="form-group full">
        <label>Status</label>
        <select id="f-status">
          <option value="Søke">Søke</option>
          <option value="Har søkt">Har søkt</option>
          <option value="Akkred Ok">Akkred Ok</option>
          <option value="Ferdig">Ferdig</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Kommentar</label>
        <textarea id="f-comment" placeholder="Notater, restriksjoner, kontaktinfo…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Avbryt</button>
      <button class="btn-primary" id="saveBtn" onclick="saveEvent()">Lagre event</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ─────────────────────────────────────────────────
  const SUPA_URL = 'https://hgsvsisnauzrlwqaicim.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhnc3ZzaXNuYXV6cmx3cWFpY2ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Mjk1MjIsImV4cCI6MjA5MTMwNTUyMn0.FrvfXV3b7zC7ct8S9Y4rbMPYWkDEnG3bZW3Kt0Rn-zw';
  const db    = supabase.createClient(SUPA_URL, SUPA_KEY);
  const TABLE = 'photo_schedule';

  const YEARS = [2014,2015,2016,2017,2019,2020,2021,2022,2023,2024,2025,2026,2027];
  const DAYS  = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];

  let events           = [];
  let allCounts        = {};   // year → count, fetched once
  let globalTypeCounts = { Konsert: 0, Fotball: 0, OsloPride: 0, Annet: 0 };
  let selectedYear     = 2026;
  let editId           = null;
  let filterType       = 'all';
  let filterStatus     = null;
  let globalSearchMode = false;
  let globalResults    = [];

  // ── Helpers ────────────────────────────────────────────────
  function setSyncState(state, label) {
    document.getElementById('syncDot').className = 'sync-dot ' + state;
    document.getElementById('syncLabel').textContent = label;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function esc(str) {
    return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function getDay(dateStr) {
    if (!dateStr) return '';
    return DAYS[new Date(dateStr + 'T12:00:00').getDay()];
  }

  function badgeClass(s) {
    return {'Søke':'badge-apply','Har søkt':'badge-applied','Akkred Ok':'badge-ok','Ferdig':'badge-done'}[s] || 'badge-apply';
  }

  function typeClass(t) {
    return {'Konsert':'type-konsert','Fotball':'type-fotball','OsloPride':'type-oslopride','Annet':'type-annet'}[t] || '';
  }

  // ── Year bar ───────────────────────────────────────────────
  async function buildYearBar() {
    // Fetch date + type for all records in one query
    const { data } = await db.from(TABLE).select('date, type');
    allCounts        = {};
    globalTypeCounts = { Konsert: 0, Fotball: 0, OsloPride: 0, Annet: 0 };

    (data || []).forEach(r => {
      if (r.date) {
        const y = parseInt(r.date.substring(0, 4));
        allCounts[y] = (allCounts[y] || 0) + 1;
      }
      if (r.type && globalTypeCounts.hasOwnProperty(r.type)) {
        globalTypeCounts[r.type]++;
      }
    });

    const bar = document.getElementById('yearBar');
    // Keep the label, rebuild buttons
    bar.innerHTML = '<span class="year-label">År:</span>';
    YEARS.forEach(y => {
      const cnt = allCounts[y] || 0;
      const btn = document.createElement('button');
      btn.className = 'year-btn' + (y === selectedYear ? ' active' : '');
      btn.innerHTML = `${y}<span class="year-count">${cnt > 0 ? '('+cnt+')' : ''}</span>`;
      btn.onclick = () => selectYear(y);
      bar.appendChild(btn);
    });

    renderTypeTotals();
  }

  function renderTypeTotals() {
    const el = document.getElementById('typeTotals');
    if (!el) return;
    const { Konsert, Fotball, OsloPride, Annet } = globalTypeCounts;
    const fmt = n => n.toLocaleString('no-NO');
    el.innerHTML = `
      <span class="type-total-item">
        <span class="type-konsert">Konsert</span>
        <strong>${fmt(Konsert)}</strong>
      </span>
      <span class="type-total-sep">·</span>
      <span class="type-total-item">
        <span class="type-fotball">Fotball</span>
        <strong>${fmt(Fotball)}</strong>
      </span>
      <span class="type-total-sep">·</span>
      <span class="type-total-item">
        <span class="type-oslopride">Pride</span>
        <strong>${fmt(OsloPride)}</strong>
      </span>
      <span class="type-total-sep">·</span>
      <span class="type-total-item">
        <span class="type-annet">Annet</span>
        <strong>${fmt(Annet)}</strong>
      </span>
    `;
  }

  // ── Search ─────────────────────────────────────────────────
  function onSearchInput() {
    const q = (document.getElementById('search').value || '').trim();
    if (q.length >= 2) {
      doGlobalSearch(q);
    } else {
      if (globalSearchMode) {
        globalSearchMode = false;
        globalResults    = [];
      }
      renderTable();
    }
  }

  async function doGlobalSearch(q) {
    setSyncState('saving', 'Søker…');
    const { data, error } = await db.from(TABLE).select('*')
      .or(`artist.ilike.%${q}%,venue.ilike.%${q}%,comment.ilike.%${q}%`)
      .order('date', { ascending: true });

    if (error) {
      setSyncState('error', 'Søkefeil');
      showToast('Søkefeil: ' + error.message, true);
      return;
    }

    globalSearchMode = true;
    globalResults    = data || [];
    setSyncState('online', 'Tilkoblet');
    renderTable();
  }

  function selectYear(year) {
    selectedYear = year;
    // Exit global search mode when switching year
    if (globalSearchMode) {
      globalSearchMode = false;
      globalResults    = [];
      document.getElementById('search').value = '';
    }
    document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.year-btn').forEach(b => {
      if (b.textContent.startsWith(year)) b.classList.add('active');
    });
    // Re-fetch for selected year
    loadEvents();
  }

  // ── Load data for selected year ────────────────────────────
  async function loadEvents() {
    setSyncState('saving', 'Laster…');
    showLoadingSkeleton();

    const from = `${selectedYear}-01-01`;
    const to   = `${selectedYear}-12-31`;

    const { data, error } = await db.from(TABLE).select('*')
      .gte('date', from).lte('date', to)
      .order('date', { ascending: true });

    if (error) {
      setSyncState('error', 'Tilkoblingsfeil');
      showToast('Kunne ikke laste data: ' + error.message, true);
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    events = data || [];
    setSyncState('online', 'Tilkoblet');
    document.getElementById('addBtn').disabled = false;

    // Update year button count
    document.querySelectorAll('.year-btn').forEach(b => {
      const y = parseInt(b.textContent);
      if (y === selectedYear) {
        b.innerHTML = `${y}<span class="year-count">${events.length > 0 ? '('+events.length+')' : ''}</span>`;
      }
    });

    renderTable();
  }

  function showLoadingSkeleton() {
    document.getElementById('tableBody').innerHTML = Array(4).fill('').map(() =>
      `<tr>${Array(10).fill('').map(() =>
        `<td><div class="skeleton" style="width:${55+Math.random()*40}%"></div></td>`
      ).join('')}</tr>`
    ).join('');
    document.getElementById('emptyState').style.display = 'none';
  }

  // ── Render table ───────────────────────────────────────────
  function renderTable() {
    const q     = (document.getElementById('search').value || '').toLowerCase();
    const body  = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');

    // In global search mode use server-filtered results; otherwise use year events
    const source = globalSearchMode ? globalResults : events;

    let filtered = source.filter(e => {
      const matchType   = filterType === 'all' || e.type === filterType;
      const matchStatus = !filterStatus || e.status === filterStatus;
      // Local text filter only applies in year mode (global mode is filtered server-side)
      const matchSearch = globalSearchMode || !q ||
        [e.artist, e.venue, e.shooting, e.management, e.comment]
          .join(' ').toLowerCase().includes(q);
      return matchType && matchStatus && matchSearch;
    });

    filtered.sort((a,b) => (a.date||'').localeCompare(b.date||''));

    if (filtered.length === 0) {
      body.innerHTML = '';
      empty.style.display = 'block';
      if (globalSearchMode) {
        empty.innerHTML = `<div class="icon">🔍</div><p>Ingen treff på "<strong>${esc(q)}</strong>" i alle år.</p>`;
      } else {
        empty.innerHTML = events.length === 0
          ? `<div class="icon">📅</div><p>Ingen events registrert for <strong>${selectedYear}</strong> ennå.<br>Klikk <strong>＋ Legg til event</strong> for å starte!</p>`
          : '<div class="icon">🔍</div><p>Ingen events matcher filteret ditt.</p>';
      }
    } else {
      empty.style.display = 'none';
      body.innerHTML = filtered.map(e => `
        <tr>
          <td>${e.date||'—'}</td>
          <td style="color:var(--muted)">${getDay(e.date)}</td>
          <td><span class="${typeClass(e.type)}">${esc(e.type)}</span></td>
          <td><strong>${esc(e.artist)}</strong></td>
          <td>${esc(e.venue)}</td>
          <td>${esc(e.shooting)}</td>
          <td>${esc(e.management)}</td>
          <td><span class="badge ${badgeClass(e.status)}">${esc(e.status)}</span></td>
          <td style="max-width:180px;color:var(--muted);font-size:12px">${esc(e.comment)}</td>
          <td>
            <div class="td-actions">
              <button class="btn-edit"   onclick="openModal('${e.id}')">Rediger</button>
              <button class="btn-danger" onclick="deleteEvent('${e.id}')">✕</button>
            </div>
          </td>
        </tr>
      `).join('');
    }
    renderStats(filtered);
  }

  function renderStats(filtered) {
    const tot = filtered.length;
    if (globalSearchMode) {
      const q = document.getElementById('search').value || '';
      const counts = ['Søke','Har søkt','Akkred Ok','Ferdig']
        .map(s => filtered.filter(e=>e.status===s).length);
      document.getElementById('stats').innerHTML = `
        <div class="stat"><span class="global-search-badge">🔍 Søker i alle år</span></div>
        <div class="stat">Treff: <strong style="color:var(--accent)">${tot}</strong></div>
        <div class="stat">Søke: <strong style="color:var(--accent)">${counts[0]}</strong></div>
        <div class="stat">Har søkt: <strong style="color:#5dade2">${counts[1]}</strong></div>
        <div class="stat">Akkred Ok: <strong style="color:#58d68d">${counts[2]}</strong></div>
        <div class="stat">Ferdig: <strong>${counts[3]}</strong></div>
      `;
    } else {
      const total = events.length;
      const counts = ['Søke','Har søkt','Akkred Ok','Ferdig'].map(s => events.filter(e=>e.status===s).length);
      document.getElementById('stats').innerHTML = `
        <div class="stat">År: <strong style="color:var(--accent)">${selectedYear}</strong></div>
        <div class="stat">Totalt: <strong>${total}</strong>${tot !== total ? ` <span style="color:var(--muted)">(viser ${tot})</span>` : ''}</div>
        <div class="stat">Søke: <strong style="color:var(--accent)">${counts[0]}</strong></div>
        <div class="stat">Har søkt: <strong style="color:#5dade2">${counts[1]}</strong></div>
        <div class="stat">Akkred Ok: <strong style="color:#58d68d">${counts[2]}</strong></div>
        <div class="stat">Ferdig: <strong>${counts[3]}</strong></div>
      `;
    }
  }

  // ── Modal ──────────────────────────────────────────────────
  function openModal(id = null) {
    editId = id;
    const e = id ? events.find(x => x.id === id) : null;
    document.getElementById('modalTitle').textContent = id ? 'Rediger event' : `Legg til event – ${selectedYear}`;
    // Default date: first day of selected year
    const defaultDate = `${selectedYear}-01-01`;
    document.getElementById('f-date').value       = e?.date       || defaultDate;
    document.getElementById('f-type').value       = e?.type       || 'Konsert';
    document.getElementById('f-artist').value     = e?.artist     || '';
    document.getElementById('f-venue').value      = e?.venue      || '';
    document.getElementById('f-shooting').value   = e?.shooting   || '';
    document.getElementById('f-management').value = e?.management || '';
    document.getElementById('f-status').value     = e?.status     || 'Søke';
    document.getElementById('f-comment').value    = e?.comment    || '';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-artist').focus(), 100);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editId = null;
  }

  function closeOnBackdrop(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  // ── Save ───────────────────────────────────────────────────
  async function saveEvent() {
    const artist = document.getElementById('f-artist').value.trim();
    if (!artist) { showToast('Vennligst fyll inn Artist / Event.', true); return; }

    const payload = {
      date:       document.getElementById('f-date').value || null,
      type:       document.getElementById('f-type').value,
      artist,
      venue:      document.getElementById('f-venue').value.trim(),
      shooting:   document.getElementById('f-shooting').value,
      management: document.getElementById('f-management').value.trim(),
      status:     document.getElementById('f-status').value,
      comment:    document.getElementById('f-comment').value.trim(),
    };

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true; saveBtn.textContent = 'Lagrer…';
    setSyncState('saving', 'Lagrer…');

    let error;
    if (editId) {
      ({ error } = await db.from(TABLE).update(payload).eq('id', editId));
    } else {
      ({ error } = await db.from(TABLE).insert(payload));
    }

    saveBtn.disabled = false; saveBtn.textContent = 'Lagre event';

    if (error) {
      setSyncState('error', 'Lagring feilet');
      showToast('Feil ved lagring: ' + error.message, true);
      return;
    }

    setSyncState('online', 'Tilkoblet');
    showToast(editId ? '✓ Event oppdatert' : '✓ Event lagt til');
    closeModal();
    await buildYearBar();
    await loadEvents();
  }

  // ── Delete ─────────────────────────────────────────────────
  async function deleteEvent(id) {
    if (!confirm('Slette dette eventet?')) return;
    setSyncState('saving', 'Sletter…');
    const { error } = await db.from(TABLE).delete().eq('id', id);
    if (error) {
      setSyncState('error', 'Sletting feilet');
      showToast('Feil ved sletting: ' + error.message, true);
      return;
    }
    setSyncState('online', 'Tilkoblet');
    showToast('✓ Event slettet');
    await buildYearBar();
    await loadEvents();
  }

  // ── Filters ────────────────────────────────────────────────
  function setFilter(val, btn) {
    filterType = val;
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function setStatusFilter(val, btn) {
    if (filterStatus === val) {
      filterStatus = null; btn.classList.remove('active');
    } else {
      filterStatus = val;
      document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    renderTable();
  }

  // ── Export CSV ─────────────────────────────────────────────
  function exportCSV() {
    const headers = ['Dato','Dag','Type','Artist/Event','Venue','Foto for','Management','Status','Kommentar'];
    const rows = events.map(e => [
      e.date, getDay(e.date), e.type, e.artist, e.venue,
      e.shooting, e.management, e.status, e.comment
    ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `photo-schedule-${selectedYear}.csv`;
    a.click();
    showToast(`✓ CSV eksportert (${selectedYear})`);
  }

  // ── Keyboard shortcuts ─────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'n' && !e.ctrlKey && !e.metaKey &&
        document.activeElement.tagName !== 'INPUT' &&
        document.activeElement.tagName !== 'TEXTAREA') openModal();
    // Left/right arrow to switch year
    if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !e.ctrlKey && !e.metaKey &&
        document.activeElement.tagName !== 'INPUT' &&
        document.activeElement.tagName !== 'TEXTAREA') {
      const idx = YEARS.indexOf(selectedYear);
      if (e.key === 'ArrowLeft'  && idx > 0)              selectYear(YEARS[idx - 1]);
      if (e.key === 'ArrowRight' && idx < YEARS.length-1) selectYear(YEARS[idx + 1]);
    }
  });

  // ── Init ───────────────────────────────────────────────────
  async function init() {
    await buildYearBar();
    await loadEvents();
  }
  init();
</script>
</body>
</html>
