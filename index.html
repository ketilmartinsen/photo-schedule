<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📸 Photo Schedule</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --surface2:  #242424;
      --border:    #333;
      --accent:    #e8a020;
      --accent2:   #c07010;
      --text:      #e8e8e8;
      --muted:     #888;
      --danger:    #c0392b;
      --ok:        #27ae60;
      --applied:   #2980b9;
      --done:      #555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
      border-bottom: 2px solid var(--accent);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    header h1 span { color: var(--text); font-weight: 300; }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    /* ── Sync indicator ── */
    .sync-indicator {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .sync-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .sync-dot.online  { background: #27ae60; }
    .sync-dot.saving  { background: var(--accent); animation: pulse 0.8s infinite; }
    .sync-dot.error   { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Buttons ── */
    button { cursor: pointer; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; padding: 8px 16px; transition: all 0.15s; }
    .btn-primary  { background: var(--accent); color: #000; }
    .btn-primary:hover  { background: var(--accent2); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #333; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 4px 10px; font-size: 12px; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-edit { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; font-size: 12px; }
    .btn-edit:hover { background: var(--accent); color: #000; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 14px 28px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .toolbar input[type="text"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      width: 220px;
    }
    .toolbar input[type="text"]::placeholder { color: var(--muted); }
    .filter-label { color: var(--muted); font-size: 12px; margin-left: 8px; }
    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { cursor: pointer; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; background: transparent; color: var(--muted); transition: all 0.15s; }
    .pill.active, .pill:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; padding: 20px 28px; }
    table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    thead tr { background: var(--surface2); text-align: left; }
    th { padding: 10px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent); border-bottom: 2px solid var(--accent); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: 9px 12px; vertical-align: middle; color: var(--text); }
    .td-actions { display: flex; gap: 6px; white-space: nowrap; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-apply   { background: #3d2200; color: #e8a020; border: 1px solid #e8a020; }
    .badge-applied { background: #0a2540; color: #5dade2; border: 1px solid #2980b9; }
    .badge-ok      { background: #0a2e1a; color: #58d68d; border: 1px solid #27ae60; }
    .badge-done    { background: #222;    color: #888;    border: 1px solid #555; }
    .type-concert  { color: #e056fd; font-weight: 600; }
    .type-football { color: #00cec9; font-weight: 600; }
    .type-various  { color: #a0aec0; font-weight: 600; }

    /* ── Loading skeleton ── */
    .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, #2e2e2e 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 4px; height: 14px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Empty & loading state ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 16px; }

    /* ── Stats ── */
    .stats { display: flex; gap: 20px; padding: 0 28px 14px; flex-wrap: wrap; }
    .stat { font-size: 12px; color: var(--muted); }
    .stat strong { color: var(--text); }

    /* ── Modal ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--accent); border-radius: 10px; padding: 28px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 17px; margin-bottom: 20px; color: var(--accent); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
    input[type="date"], input[type="text"], select, textarea {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; width: 100%; transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    select option { background: var(--surface2); }
    textarea { resize: vertical; min-height: 60px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); color: var(--text); padding: 12px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transform: translateY(10px); transition: all 0.25s; z-index: 200; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-left-color: var(--danger); }

    @media (max-width: 600px) {
      header, .toolbar, .table-wrap, .stats { padding-left: 14px; padding-right: 14px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>📸 <span>Photo</span>Schedule</h1>
  <div class="header-actions">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Connecting…</span>
    </div>
    <button class="btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn-primary" onclick="openModal()" id="addBtn" disabled>＋ Add Event</button>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="🔍 Search events…" oninput="renderTable()">
  <span class="filter-label">Filter:</span>
  <div class="filter-pills">
    <button class="pill active" data-filter="all"      onclick="setFilter('all',this)">All</button>
    <button class="pill"        data-filter="Concert"  onclick="setFilter('Concert',this)">Concert</button>
    <button class="pill"        data-filter="Football" onclick="setFilter('Football',this)">Football</button>
    <button class="pill"        data-filter="Various"  onclick="setFilter('Various',this)">Various</button>
  </div>
  <div class="filter-pills" style="margin-left:8px;">
    <button class="pill" data-status="Apply"   onclick="setStatusFilter('Apply',this)">Apply</button>
    <button class="pill" data-status="Applied" onclick="setStatusFilter('Applied',this)">Applied</button>
    <button class="pill" data-status="Ok"      onclick="setStatusFilter('Ok',this)">Ok</button>
    <button class="pill" data-status="Done"    onclick="setStatusFilter('Done',this)">Done</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Day</th>
        <th>Type</th>
        <th>Artist / Event</th>
        <th>Venue</th>
        <th>Shooting For</th>
        <th>Management</th>
        <th>Status</th>
        <th>Comment</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">🎸</div>
    <p>No events yet — click <strong>+ Add Event</strong> to get started!</p>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <h2 id="modalTitle">Add Event</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option value="Concert">Concert</option>
          <option value="Football">Football</option>
          <option value="Various">Various</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Artist / Event</label>
        <input type="text" id="f-artist" placeholder="e.g. Metallica, Champions League Final">
      </div>
      <div class="form-group full">
        <label>Venue</label>
        <input type="text" id="f-venue" placeholder="e.g. Telenor Arena, Ullevaal Stadion">
      </div>
      <div class="form-group">
        <label>Shooting For</label>
        <input type="text" id="f-shooting" placeholder="e.g. VG, Aftenposten">
      </div>
      <div class="form-group">
        <label>Management</label>
        <input type="text" id="f-management" placeholder="e.g. Live Nation">
      </div>
      <div class="form-group full">
        <label>Status</label>
        <select id="f-status">
          <option value="Apply">Apply</option>
          <option value="Applied">Applied</option>
          <option value="Ok">Ok</option>
          <option value="Done">Done</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Comment</label>
        <textarea id="f-comment" placeholder="Notes, restrictions, contacts…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="saveBtn" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Supabase init ──────────────────────────────────────────
  const SUPA_URL = 'https://hgsvsisnauzrlwqaicim.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhnc3ZzaXNuYXV6cmx3cWFpY2ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3Mjk1MjIsImV4cCI6MjA5MTMwNTUyMn0.FrvfXV3b7zC7ct8S9Y4rbMPYWkDEnG3bZW3Kt0Rn-zw';
  const { createClient } = supabase;
  const db = createClient(SUPA_URL, SUPA_KEY);
  const TABLE = 'photo_schedule';

  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  let events = [];
  let editId = null;
  let filterType = 'all';
  let filterStatus = null;

  // ── Sync UI ────────────────────────────────────────────────
  function setSyncState(state, label) {
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    dot.className = 'sync-dot ' + state;
    lbl.textContent = label;
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Load data ──────────────────────────────────────────────
  async function loadEvents() {
    setSyncState('saving', 'Loading…');
    showLoadingSkeleton();
    const { data, error } = await db.from(TABLE).select('*').order('date', { ascending: true });
    if (error) {
      setSyncState('error', 'Connection error');
      showToast('Could not load data: ' + error.message, true);
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').innerHTML = '<div class="icon">⚠️</div><p>Could not connect to database.</p>';
      return;
    }
    events = data || [];
    setSyncState('online', 'Connected');
    document.getElementById('addBtn').disabled = false;
    renderTable();
  }

  function showLoadingSkeleton() {
    const body = document.getElementById('tableBody');
    body.innerHTML = Array(5).fill('').map(() => `
      <tr>${Array(10).fill('').map(() => `<td><div class="skeleton" style="width:${60+Math.random()*40}%"></div></td>`).join('')}</tr>
    `).join('');
  }

  // ── Render ─────────────────────────────────────────────────
  function getDay(dateStr) {
    if (!dateStr) return '';
    return DAYS[new Date(dateStr + 'T12:00:00').getDay()];
  }

  function badgeClass(s) {
    return { Apply:'badge-apply', Applied:'badge-applied', Ok:'badge-ok', Done:'badge-done' }[s] || 'badge-apply';
  }

  function typeClass(t) {
    return { Concert:'type-concert', Football:'type-football', Various:'type-various' }[t] || '';
  }

  function esc(str) {
    return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTable() {
    const q = (document.getElementById('search').value || '').toLowerCase();
    const body = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');

    let filtered = events.filter(e => {
      const matchType   = filterType === 'all' || e.type === filterType;
      const matchStatus = !filterStatus || e.status === filterStatus;
      const matchSearch = !q || [e.artist, e.venue, e.shooting, e.management, e.comment]
        .join(' ').toLowerCase().includes(q);
      return matchType && matchStatus && matchSearch;
    });

    filtered.sort((a,b) => (a.date||'').localeCompare(b.date||''));

    if (filtered.length === 0) {
      body.innerHTML = '';
      empty.style.display = 'block';
      empty.innerHTML = events.length === 0
        ? '<div class="icon">🎸</div><p>No events yet — click <strong>+ Add Event</strong> to get started!</p>'
        : '<div class="icon">🔍</div><p>No events match your filter.</p>';
    } else {
      empty.style.display = 'none';
      body.innerHTML = filtered.map(e => `
        <tr>
          <td>${e.date||'—'}</td>
          <td style="color:var(--muted)">${getDay(e.date)}</td>
          <td><span class="${typeClass(e.type)}">${esc(e.type)}</span></td>
          <td><strong>${esc(e.artist)}</strong></td>
          <td>${esc(e.venue)}</td>
          <td>${esc(e.shooting)}</td>
          <td>${esc(e.management)}</td>
          <td><span class="badge ${badgeClass(e.status)}">${esc(e.status)}</span></td>
          <td style="max-width:180px;color:var(--muted);font-size:12px">${esc(e.comment)}</td>
          <td>
            <div class="td-actions">
              <button class="btn-edit"   onclick="openModal('${e.id}')">Edit</button>
              <button class="btn-danger" onclick="deleteEvent('${e.id}')">✕</button>
            </div>
          </td>
        </tr>
      `).join('');
    }
    renderStats();
  }

  function renderStats() {
    const t = events.length;
    const counts = ['Apply','Applied','Ok','Done'].map(s => events.filter(e=>e.status===s).length);
    document.getElementById('stats').innerHTML = `
      <div class="stat">Total: <strong>${t}</strong></div>
      <div class="stat">Apply: <strong style="color:var(--accent)">${counts[0]}</strong></div>
      <div class="stat">Applied: <strong style="color:#5dade2">${counts[1]}</strong></div>
      <div class="stat">Confirmed: <strong style="color:#58d68d">${counts[2]}</strong></div>
      <div class="stat">Done: <strong>${counts[3]}</strong></div>
    `;
  }

  // ── Modal ──────────────────────────────────────────────────
  function openModal(id = null) {
    editId = id;
    const e = id ? events.find(x => x.id === id) : null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Event' : 'Add Event';
    document.getElementById('f-date').value       = e?.date       || '';
    document.getElementById('f-type').value       = e?.type       || 'Concert';
    document.getElementById('f-artist').value     = e?.artist     || '';
    document.getElementById('f-venue').value      = e?.venue      || '';
    document.getElementById('f-shooting').value   = e?.shooting   || '';
    document.getElementById('f-management').value = e?.management || '';
    document.getElementById('f-status').value     = e?.status     || 'Apply';
    document.getElementById('f-comment').value    = e?.comment    || '';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-artist').focus(), 100);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editId = null;
  }

  function closeOnBackdrop(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  // ── Save (insert / update) ─────────────────────────────────
  async function saveEvent() {
    const artist = document.getElementById('f-artist').value.trim();
    if (!artist) { showToast('Please enter Artist / Event name.', true); return; }

    const payload = {
      date:       document.getElementById('f-date').value       || null,
      type:       document.getElementById('f-type').value,
      artist,
      venue:      document.getElementById('f-venue').value.trim(),
      shooting:   document.getElementById('f-shooting').value.trim(),
      management: document.getElementById('f-management').value.trim(),
      status:     document.getElementById('f-status').value,
      comment:    document.getElementById('f-comment').value.trim(),
    };

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    setSyncState('saving', 'Saving…');

    let error;
    if (editId) {
      ({ error } = await db.from(TABLE).update(payload).eq('id', editId));
    } else {
      ({ error } = await db.from(TABLE).insert(payload));
    }

    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Event';

    if (error) {
      setSyncState('error', 'Save failed');
      showToast('Error saving: ' + error.message, true);
      return;
    }

    setSyncState('online', 'Connected');
    showToast(editId ? '✓ Event updated' : '✓ Event added');
    closeModal();
    await loadEvents();
  }

  // ── Delete ─────────────────────────────────────────────────
  async function deleteEvent(id) {
    if (!confirm('Delete this event?')) return;
    setSyncState('saving', 'Deleting…');
    const { error } = await db.from(TABLE).delete().eq('id', id);
    if (error) {
      setSyncState('error', 'Delete failed');
      showToast('Error deleting: ' + error.message, true);
      return;
    }
    setSyncState('online', 'Connected');
    showToast('✓ Event deleted');
    await loadEvents();
  }

  // ── Filters ────────────────────────────────────────────────
  function setFilter(val, btn) {
    filterType = val;
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function setStatusFilter(val, btn) {
    if (filterStatus === val) {
      filterStatus = null;
      btn.classList.remove('active');
    } else {
      filterStatus = val;
      document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    renderTable();
  }

  // ── Export CSV ─────────────────────────────────────────────
  function exportCSV() {
    const headers = ['Date','Day','Type','Artist/Event','Venue','Shooting For','Management','Status','Comment'];
    const rows = events.map(e => [
      e.date, getDay(e.date), e.type, e.artist, e.venue,
      e.shooting, e.management, e.status, e.comment
    ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = 'photo-schedule.csv';
    a.click();
    showToast('✓ CSV exported');
  }

  // ── Keyboard shortcuts ─────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'n' && !e.ctrlKey && !e.metaKey &&
        document.activeElement.tagName !== 'INPUT' &&
        document.activeElement.tagName !== 'TEXTAREA') openModal();
  });

  // ── Init ───────────────────────────────────────────────────
  loadEvents();
</script>
</body>
</html>
